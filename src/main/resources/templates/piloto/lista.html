<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AeroSys — Pilotos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/global.css}"/>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="page">
    <nav class="breadcrumb">
        <a th:href="@{/}">Início</a><span class="breadcrumb-sep">›</span><span>Pilotos</span>
    </nav>
    <div class="page-header">
        <div><h1 class="page-title">Pilotos</h1><p class="page-subtitle">Cadastro e gerenciamento de pilotos</p></div>
        <a th:href="@{/pilotos/novo}" class="btn btn-primary">+ Novo Piloto</a>
    </div>
    <div class="table-wrapper">
        <table>
            <thead>
            <tr><th>Nome</th><th>Matrícula</th><th>CPF</th><th>Habilitação</th><th>Idade</th><th>Renovação</th><th>Status</th><th>Ações</th></tr>
            </thead>
            <tbody>
            <tr th:each="piloto : ${pilotos}">
                <td class="text-bold" th:text="${piloto.nome}"></td>
                <td><span class="code-tag" th:text="${piloto.matricula}"></span></td>
                <td th:text="${piloto.cpf}"></td>
                <td th:text="${piloto.habilitacao}"></td>
                <td th:text="${piloto.idade}"></td>
                <td th:text="${#temporals.format(piloto.dataRenovacao, 'dd/MM/yyyy')}"></td>
                <td><span class="badge" th:classappend="'badge-' + ${#strings.toLowerCase(piloto.status)}" th:text="${piloto.status}"></span></td>
                <td class="actions-cell">
                    <a th:href="@{/pilotos/{id}(id=${piloto.id})}" class="btn btn-secondary btn-sm">Ver</a>
                    <a th:href="@{/pilotos/editar/{id}(id=${piloto.id})}" class="btn btn-secondary btn-sm">Editar</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(pilotos)}">
                <td colspan="8"><div class="empty-state"><div class="empty-state-icon">👨‍✈️</div><div class="empty-state-text">Nenhum piloto cadastrado ainda.</div></div></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<footer class="footer"><div class="footer-inner">© 2026 AeroSys — Sistema de Gerenciamento Aeroportuário</div></footer>
</body>
</html>
