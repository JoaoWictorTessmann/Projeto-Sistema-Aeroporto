<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AeroSys — Novo Piloto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/global.css}"/>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="page">
    <nav class="breadcrumb">
        <a th:href="@{/}">Início</a><span class="breadcrumb-sep">›</span>
        <a th:href="@{/pilotos}">Pilotos</a><span class="breadcrumb-sep">›</span>
        <span th:text="${piloto != null} ? 'Editar' : 'Novo Piloto'"></span>
    </nav>
    <div class="page-header">
        <div><h1 class="page-title" th:text="${piloto != null} ? 'Editar Piloto' : 'Novo Piloto'"></h1><p class="page-subtitle">Preencha os dados do piloto</p></div>
    </div>
    <div class="card">
        <div class="card-body">
            <div id="alert-area"></div>
            <div class="form-grid">
                <div class="form-group form-full"><label for="nome">Nome Completo</label><input type="text" id="nome" placeholder="Ex: Carlos Eduardo Souza" th:value="${piloto?.nome}"/></div>
                <div class="form-group"><label for="cpf">CPF (somente números)</label><input type="text" id="cpf" placeholder="Ex: 12345678901" maxlength="11" th:value="${piloto?.cpf}" th:disabled="${piloto != null}"/></div>
                <div class="form-group"><label for="idade">Idade</label><input type="number" id="idade" placeholder="Ex: 35" min="18" th:value="${piloto?.idade}"/></div>
                <div class="form-group">
                    <label for="genero">Gênero</label>
                    <select id="genero">
                        <option value="M" th:selected="${piloto?.genero == 'M'}">Masculino</option>
                        <option value="F" th:selected="${piloto?.genero == 'F'}">Feminino</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="habilitacao">Habilitação</label>
                    <select id="habilitacao">
                        <option value="ATPL-A" th:selected="${piloto?.habilitacao == 'ATPL-A'}">ATPL-A</option>
                        <option value="ATPL-H" th:selected="${piloto?.habilitacao == 'ATPL-H'}">ATPL-H</option>
                        <option value="CPL-A"  th:selected="${piloto?.habilitacao == 'CPL-A'}">CPL-A</option>
                        <option value="CPL-H"  th:selected="${piloto?.habilitacao == 'CPL-H'}">CPL-H</option>
                        <option value="PPL-A"  th:selected="${piloto?.habilitacao == 'PPL-A'}">PPL-A</option>
                    </select>
                </div>
                <div class="form-group" th:if="${piloto != null}">
                    <label for="status">Status</label>
                    <select id="status">
                        <option value="ATIVO"   th:selected="${piloto?.status == 'ATIVO'}">Ativo</option>
                        <option value="INATIVO" th:selected="${piloto?.status == 'INATIVO'}">Inativo</option>
                    </select>
                </div>
            </div>
            <div class="form-actions">
                <button class="btn btn-primary" onclick="salvarPiloto()"><span th:text="${piloto != null} ? 'Salvar Alterações' : 'Cadastrar Piloto'"></span></button>
                <a th:href="@{/pilotos}" class="btn btn-secondary">Cancelar</a>
            </div>
        </div>
    </div>
</div>

<footer class="footer"><div class="footer-inner">© 2026 AeroSys — Sistema de Gerenciamento Aeroportuário</div></footer>

<script th:inline="javascript">
    const pilotoId = /*[[${piloto?.id}]]*/ null;
    async function salvarPiloto() {
        const body = {
            nome: document.getElementById('nome').value,
            cpf: document.getElementById('cpf')?.value,
            idade: parseInt(document.getElementById('idade').value),
            genero: document.getElementById('genero').value,
            habilitacao: document.getElementById('habilitacao').value,
            status: document.getElementById('status')?.value,
        };
        const url = pilotoId ? `/api/pilotos/${pilotoId}` : '/api/pilotos';
        const method = pilotoId ? 'PUT' : 'POST';
        try {
            const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
            const data = await res.json();
            if (res.ok) { window.location.href = '/pilotos/' + data.id; }
            else { showAlert(data.message || 'Erro ao salvar piloto.'); }
        } catch (e) { showAlert('Erro de conexão com o servidor.'); }
    }
    function showAlert(msg) {
        document.getElementById('alert-area').innerHTML = `<div class="alert alert-error">${msg}</div>`;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>
</body>
</html>
